name: ADHDIgniter
options:
  bundleIdPrefix: com.itnewcomer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

schemes:
  ADHDIgniter:
    build:
      targets:
        ADHDIgniter: all
    run:
      config: Debug

targets:
  ADHDIgniter:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
    dependencies:
      - target: ADHDIgniterLiveActivity
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "ADHD Igniter"
        PRODUCT_BUNDLE_IDENTIFIER: com.itnewcomer.ADHDIgniter
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSSupportsLiveActivities: true

  ADHDIgniterLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: LiveActivity
        excludes:
          - Info.plist
    info:
      path: LiveActivity/Info.plist
      properties:
        CFBundleDisplayName: "Focus Timer"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.itnewcomer.ADHDIgniter.LiveActivity
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  ADHDIgniterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: ADHDIgniter
    settings:
      base:
        SWIFT_VERSION: "5.9"
